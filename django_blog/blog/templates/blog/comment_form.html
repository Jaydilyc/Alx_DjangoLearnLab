{% extends "blog/base.html" %}

{% block title %}Edit Comment{% endblock %}

{% block content %}
<h1>Edit Comment</h1>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Update Comment</button>
</form>

<p><a href="{% url 'post-detail' object.post.pk %}">Back to Post</a></p>
{% endblock %}touch
