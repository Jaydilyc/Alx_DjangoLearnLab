{% extends "blog/base.html" %}

{% block title %}Post Form{% endblock %}

{% block content %}
<h1>
    {% if form.instance.pk %}
        Edit Post
    {% else %}
        Create New Post
    {% endif %}
</h1>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
</form>

<p><a href="{% url 'post-list' %}">Back to posts</a></p>
{% endblock %}
